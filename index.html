<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<style>
    .content {
        display: flex;
        gap: 30px;
    }

    .table-content {
        flex: 1;
    }

    .task-table {
        width: 100%;
        border-radius: 10px;
        border-collapse: separate;
        border-spacing: 0;
        overflow: hidden;
        box-shadow:
            0 4px 10px rgba(0, 0, 0, 0.15),
            0 12px 30px rgba(0, 0, 0, 0.12);

        background-color: white;
    }

    .task-table thead tr {
        background-color: rgb(4, 6, 37);
        color: white;
    }

    .task-content {
        flex: 1;
    }

    .table-content,
    .task-content {
        display: flex;
        flex-direction: column;
    }

    .amet,
    .action-content {
        height: 60px;
        display: flex;
        align-items: center;
    }

    .task-table td {
        padding: 15px;
        font-size: larger;
        text-align: center;
    }

    .task-table tbody tr:nth-child(even) {
        background-color: whitesmoke;
    }

    .buttons-section {
        display: flex;
        gap: 15px;
    }

    .buttons-section button {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;

        color: white;
        text-shadow: 1px 1px #000000;
        border: none;
        border-radius: 6px;
        padding: 10px 18px;
        transition: box-shadow 0.2s ease;
    }

    .start-btn {
        background: greenyellow;
    }

    .end-btn {
        background: red;
    }

    .buttons-section button:hover {
        box-shadow: 2px 2px #000000;
        cursor: pointer;
    }

    .action-content {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 30px;
        padding-bottom: 5px;
    }

    .amet {
        margin: 0px;
        margin-bottom: 10px;
        font-size: x-large;
        text-align: center;
        font-weight: bold;
    }

    .task-table tbody tr {
        transition:
            background-color 0.2s ease,
            transform 0.15s ease;
    }

    .task-table tbody tr:hover {
        background-color: rgb(220, 235, 255);
        transform: scale(1.01);
        cursor: pointer;
    }

    .pdf-content {
        height: 850px;
        border-radius: 10px;
        overflow: hidden;
        box-shadow:
            0 6px 12px rgba(0, 0, 0, 0.18),
            0 16px 40px rgba(0, 0, 0, 0.15);
    }

    .pdf-content iframe {
        width: 100%;
        height: 100%;
        border: none;
    }

    .task-table tbody tr.selected {
        background-color: rgb(187, 222, 251);
    }

    .task-table tbody tr.selected:hover {
        background-color: rgb(187, 222, 251);
    }
</style>

<body>
    <div class="content">
        <div class="table-content">
            <p class="amet">L&otilde;ikamine</p>
            <table class="task-table">
                <thead>
                    <tr>
                        <td width="80">T Nr.</td>
                        <td width="30">Mat.</td>
                        <td width="50">SO</td>
                        <td width="">T&ouml;&ouml;k&auml;sk</td>
                        <td>Kogus</td>
                    </tr>
                </thead>
                <tbody>

                </tbody>
            </table>
        </div>
        <div class="task-content">
            <div class="action-content">
                <div class="buttons-section">
                    <button class="task-data">T&ouml;&ouml;k&auml;sk</button>
                    <button class="start-btn">Alusta <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-flag-icon lucide-flag">
                            <path
                                d="M4 22V4a1 1 0 0 1 .4-.8A6 6 0 0 1 8 2c3 0 5 2 7.333 2q2 0 3.067-.8A1 1 0 0 1 20 4v10a1 1 0 0 1-.4.8A6 6 0 0 1 16 16c-3 0-5-2-8-2a6 6 0 0 0-4 1.528" />
                        </svg></button>

                    <button class="end-btn">L&otilde;peta <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round"
                            class="lucide lucide-flag-off-icon lucide-flag-off">
                            <path d="M16 16c-3 0-5-2-8-2a6 6 0 0 0-4 1.528" />
                            <path d="m2 2 20 20" />
                            <path d="M4 22V4" />
                            <path d="M7.656 2H8c3 0 5 2 7.333 2q2 0 3.067-.8A1 1 0 0 1 20 4v10.347" />
                        </svg></button>
                </div>
                <div class="task-data">
                    <p>Klient: X</p>
                    <p>T&auml;htaeg: HOMME</p>
                </div>
            </div>
            <div class="pdf-content">
                <iframe id="pdfViewer" src="test.pdf"></iframe>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

</body>

<script type="module">

    import { DataFetcher } from "./DataFetcher.js";
    import { Order } from "./Order.js";

    const fetcher = new DataFetcher(
        "https://keraplast.prodcell.com/api"
    );

    const orders = await fetcher.getOrders();

    /*
    let orders = [
        {
            t_nr: "T1221",
            material: "P",
            so_nr: 4042,
            client: "EhitusFirma",
            object: "Ehitusplats",
            order_task: "23/01: 1200*2400 750/70 RR20/Zn",
            amount: 5,
            state: "lnpk",
            status: "active",
            pdf: "test2.pdf",
            completion_date: null
        },
        {
            t_nr: "T1231",
            material: "P",
            so_nr: 4043,
            client: "Lammutusfirma",
            object: "Lammutusplats",
            order_task: "23/01/K: 1000*1000 300/70 Zn/Zn 500N:1tk",
            amount: 1,
            state: "p",
            status: "done",
            pdf: "test.pdf",
            completion_date: "2026-05-24"
        },
    ];
    */

    let task_table = document.getElementById("task-table");

    let table_body = document.querySelector(".task-table tbody");

    for (const order of orders) {

        let table_row = document.createElement("tr");

        table_row.innerHTML = `
            <td>${order.getTNr()}</td>
            <td>${order.getMaterial()}</td>
            <td>${order.getSoNr()}</td>
            <td>${order.getTask()}</td>
            <td>${Math.trunc(order.getAmount())}</td>
        `;

        table_row.addEventListener("click", async () => {

            if (!table_row.classList.contains("selected")) {
                await loadPdf(order.getPdf());
            }

            document
                .querySelectorAll(".task-table tbody tr")
                .forEach(row => row.classList.remove("selected"));

            table_row.classList.add("selected");

        });

        table_body.appendChild(table_row);
    }

    async function loadPdf(pdfPath) {

        const existingPdfBytes = await fetch(pdfPath)
            .then(res => res.arrayBuffer());

        const pdfDoc = await PDFLib.PDFDocument.load(existingPdfBytes);

        const pdfBytes = await pdfDoc.save();

        const blob = new Blob(
            [pdfBytes],
            { type: "application/pdf" }
        );

        const url = URL.createObjectURL(blob);

        document.getElementById("pdfViewer").src = url;
    }

    /*

</script>

</html>
